services:
  # ── Ollama (CPU) ────────────────────────────────────────────────────────────
  briefscope_ollama_cpu:
    image: ollama/ollama:latest
    container_name: briefscope_ollama_cpu
    volumes:
      - briefscope_ollama_cpu_models:/root/.ollama
    networks:
      - queai_network
    restart: unless-stopped
    # Ollama exposes port 11434 internally — not published to host

  # ── ChromaDB vector store ─────────────────────────────────────────────────
  briefscope_chroma_cpu:
    image: chromadb/chroma:1.5.9
    container_name: briefscope_chroma_cpu
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - briefscope_chroma_cpu_data:/data
    networks:
      - queai_network
    restart: unless-stopped
    # Chroma listens on 8000 internally — not published to host

  # ── BriefScope app ──────────────────────────────────────────────────────────
  briefscope_local_cpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: briefscope_local_cpu_service
    environment:
      - ROOT_PATH=/api/briefscope_local_cpu
      - LLM_MODE=local
      - OLLAMA_HOST=http://briefscope_ollama_cpu:11434
    volumes:
      - briefscope_local_cpu_data:/code/data
      - briefscope_local_cpu_generated:/code/generated
    networks:
      - queai_network
    depends_on:
      - briefscope_ollama_cpu
      - briefscope_chroma_cpu
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.briefscope_local_cpu.rule=PathPrefix(`/api/briefscope_local_cpu`)"
      - "traefik.http.routers.briefscope_local_cpu.entrypoints=web"
      - "traefik.http.services.briefscope_local_cpu.loadbalancer.server.port=8080"

volumes:
  briefscope_ollama_cpu_models:   # persists downloaded models across restarts
  briefscope_local_cpu_data:
  briefscope_local_cpu_generated:
  briefscope_chroma_cpu_data:

networks:
  queai_network:
    external: true
